<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="card">

    <h2 class="title">Expense Tracker</h2>

    <div class="balance-box">
      <span>Your Balance</span>
      <h1 id="balance">$0.00</h1>
    </div>

    <div class="inc-exp-container">
      <div class="income">
        <span>Income</span>
        <p id="money-plus">+$0.00</p>
      </div>

      <div class="expense">
        <span>Expense</span>
        <p id="money-minus">-$0.00</p>
      </div>
    </div>

    <h3>History</h3>
    <ul id="list" class="list"></ul>

    <div class="empty" id="empty">No transactions yet</div>

    <h3>Add new transaction</h3>

    <form id="form">
      <div class="form-control">
        <input type="text" id="text" placeholder="Enter title..." required>
      </div>

      <div class="form-control">
        <input type="number" id="amount" placeholder="Amount (+/-)" required>
      </div>

      <!-- ✅ FIX -->
      <button type="submit" class="btn">Add Transaction</button>
    </form>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
