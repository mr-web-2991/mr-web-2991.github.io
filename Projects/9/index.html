<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyrics Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <h1>Lyrics Pro</h1>

  <form id="form" class="search-box">
    <input id="search" placeholder="Search artist or song..." autocomplete="off">
    <button type="submit">Search</button>
  </form>
</header>

<main class="container">
  <div id="result"></div>
  <div id="more" class="pagination"></div>
  <div id="loader" class="loader"></div>
</main>

<script src="script.js"></script>
</body>
</html>
