<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>Hangman Pro</h1>

  <div class="modes">
    <button data-mode="easy">Easy</button>
    <button data-mode="medium" class="active">Medium</button>
    <button data-mode="hard">Hard</button>
  </div>

  <div id="lives" class="lives"></div>

  <svg class="figure" viewBox="0 0 200 250">
    <line x1="60" y1="20" x2="140" y2="20"/>
    <line x1="140" y1="20" x2="140" y2="50"/>
    <line x1="60" y1="20" x2="60" y2="230"/>
    <line x1="20" y1="230" x2="100" y2="230"/>

    <circle cx="140" cy="70" r="20" class="part"/>
    <line x1="140" y1="90" x2="140" y2="150" class="part"/>
    <line x1="140" y1="120" x2="120" y2="100" class="part"/>
    <line x1="140" y1="120" x2="160" y2="100" class="part"/>
    <line x1="140" y1="150" x2="120" y2="180" class="part"/>
    <line x1="140" y1="150" x2="160" y2="180" class="part"/>
  </svg>

  <div id="wrong" class="wrong"></div>
  <div id="word" class="word"></div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2 id="result"></h2>
      <p id="reveal"></p>
      <button id="restart">Play Again</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
