<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Finder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header class="header">
    <h1>Meal Finder</h1>

    <form id="form" class="search-box">
      <input id="search" placeholder="Search meals..." autocomplete="off">
      <button type="submit">Search</button>
    </form>

    <button id="random" class="random-btn">Random</button>
  </header>

  <main class="container">

    <div id="state" class="state"></div>

    <div id="meals" class="meals"></div>

    <div id="single-meal" class="single"></div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
